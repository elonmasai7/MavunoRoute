{% extends "base.html" %}
{% block content %}
<section class="hero">
  <h1>MVP Operational Flow</h1>
  <p>Run the core journey: harvest -> demand -> match -> route.</p>
</section>

<section class="card" style="margin-top: 1rem;">
  <h2>1) Create Harvest Batch</h2>
  <form id="harvest-form">
    <label>Farmer ID <input type="text" name="farmer_id" required /></label>
    <label>Crop ID <input type="text" name="crop_id" required /></label>
    <label>Quantity KG <input type="number" name="quantity_kg" min="1" required /></label>
    <label>Expected Harvest DateTime <input type="datetime-local" name="expected_harvest_datetime" required /></label>
    <label>Grade <input type="text" name="grade" value="A" required /></label>
    <label>Packaging <input type="text" name="packaging_type" value="Crate" required /></label>
    <label>Asking Price/KG <input type="number" name="asking_price_per_kg" min="1" required /></label>
    <label>Latitude <input type="number" name="latitude" step="0.000001" required /></label>
    <label>Longitude <input type="number" name="longitude" step="0.000001" required /></label>
    <button type="submit" class="btn primary">Create Harvest</button>
  </form>
  <p class="form-message" id="harvest-message"></p>
</section>

<section class="card" style="margin-top: 1rem;">
  <h2>2) Create Buyer Demand</h2>
  <form id="demand-form">
    <label>Buyer ID <input type="text" name="buyer_id" required /></label>
    <label>Crop ID <input type="text" name="crop_id" required /></label>
    <label>Quantity KG <input type="number" name="quantity_kg" min="1" required /></label>
    <label>Desired Grade <input type="text" name="desired_grade" value="A" required /></label>
    <label>Max Price/KG <input type="number" name="max_price_per_kg" min="1" required /></label>
    <label>Required Delivery DateTime <input type="datetime-local" name="required_delivery_datetime" required /></label>
    <label>Delivery Latitude <input type="number" name="delivery_latitude" step="0.000001" required /></label>
    <label>Delivery Longitude <input type="number" name="delivery_longitude" step="0.000001" required /></label>
    <button type="submit" class="btn primary">Create Demand</button>
  </form>
  <p class="form-message" id="demand-message"></p>
</section>

<section class="card" style="margin-top: 1rem;">
  <h2>3) Match and Plan Route</h2>
  <form id="match-form">
    <label>Buyer Demand ID <input type="text" name="buyer_demand_id" required /></label>
    <button type="submit" class="btn primary">Match Harvests</button>
  </form>
  <p class="form-message" id="match-message"></p>
  <pre id="match-output"></pre>
</section>

<script src="/static/js/app.js"></script>
{% endblock %}
