{% extends "layouts/admin.html" %}
{% block title %}Job Detail - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Job {{ job_id }}</h2></div>
  <div class="detail-grid"><div class="detail-section"><h3>Details</h3><div id="job-detail"><p class="text-muted">Loading...</p></div></div></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var j = await apiRequest("/api/v1/transport-jobs/{{ job_id }}");
    var html = '<div class="detail-row"><span class="detail-label">Route</span><span class="detail-value">'+(j.route_id||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Transporter</span><span class="detail-value">'+(j.transporter_name||j.transporter_id||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Vehicle</span><span class="detail-value">'+(j.vehicle_id||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-'+j.status+'">'+j.status+'</span></span></div>' +
      '<div class="detail-row"><span class="detail-label">Scheduled</span><span class="detail-value">'+formatDateTime(j.scheduled_at)+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Completed</span><span class="detail-value">'+(j.completed_at?formatDateTime(j.completed_at):'-')+'</span></div>';
    document.getElementById("job-detail").innerHTML = html;
  } catch(e) {
    document.getElementById("job-detail").innerHTML = '<p class="text-danger">Error loading job.</p>';
  }
});
</script>
{% endblock %}
