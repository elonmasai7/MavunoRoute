{% extends "layouts/admin.html" %}
{% block title %}Harvest Detail - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Harvest {{ harvest_id }}</h2></div>
  <div class="detail-grid"><div class="detail-section"><h3>Details</h3><div id="harvest-detail"><p class="text-muted">Loading...</p></div></div></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var h = await apiRequest("/api/v1/harvest-batches/{{ harvest_id }}");
    var html = '<div class="detail-row"><span class="detail-label">Farmer</span><span class="detail-value">'+(h.farmer_name||h.farmer_id||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Crop</span><span class="detail-value">'+(h.crop_name||h.crop_id)+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Quantity</span><span class="detail-value">'+h.quantity_kg+' kg</span></div>' +
      '<div class="detail-row"><span class="detail-label">Grade</span><span class="detail-value">'+h.grade+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Price/kg</span><span class="detail-value">'+formatCurrency(h.asking_price_per_kg)+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-'+h.status+'">'+h.status+'</span></span></div>';
    document.getElementById("harvest-detail").innerHTML = html;
  } catch(e) {
    document.getElementById("harvest-detail").innerHTML = '<p class="text-danger">Error loading harvest.</p>';
  }
});
</script>
{% endblock %}
