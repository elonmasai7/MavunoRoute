{% extends "layouts/admin.html" %}
{% block title %}Settings - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <h2>System Settings</h2>
  <p class="text-muted">Platform configuration options (read-only for now).</p>

</section>
{% endblock %}
