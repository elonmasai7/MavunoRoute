{% extends "layouts/admin.html" %}
{% block title %}Buyer Detail - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Buyer {{ buyer_id }}</h2></div>
  <div class="detail-grid"><div class="detail-section"><h3>Details</h3><div id="buyer-detail"><p class="text-muted">Loading...</p></div></div></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var b = await apiRequest("/api/v1/admin/buyers/{{ buyer_id }}");
    var html = '<div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">'+(b.full_name||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">'+(b.email||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">'+(b.phone_number||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-'+(b.is_active?'success':'danger')+'">'+(b.is_active?'ACTIVE':'INACTIVE')+'</span></span></div>';
    document.getElementById("buyer-detail").innerHTML = html;
  } catch(e) {
    document.getElementById("buyer-detail").innerHTML = '<p class="text-danger">Error loading buyer.</p>';
  }
});
</script>
{% endblock %}
