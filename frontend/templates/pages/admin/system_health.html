{% extends "layouts/admin.html" %}
{% block title %}System Health - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>System Health</h2><button id="refresh-health" class="btn btn-sm btn-outline">Refresh</button></div>
  <div id="health-data"><p class="text-muted">Loading health data...</p></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", function() {
  async function loadHealth() {
    try {
      var h = await apiRequest("/api/v1/health");
      var db = await apiRequest("/api/v1/health/database");
      var redis = await apiRequest("/api/v1/health/redis");
      var integrations = await apiRequest("/api/v1/health/integrations");
      var html = '<div class="dashboard-grid">' +
        '<div class="stat-card stat-success"><div class="stat-label">API</div><div class="stat-value">'+(h.status||'OK')+'</div></div>' +
        '<div class="stat-card stat-info"><div class="stat-label">Database</div><div class="stat-value">'+(db.status||'OK')+'</div></div>' +
        '<div class="stat-card"><div class="stat-label">Redis</div><div class="stat-value">'+(redis.status||'N/A')+'</div></div>' +
        '<div class="stat-card"><div class="stat-label">Failed Integrations</div><div class="stat-value">'+(integrations.failed_integrations || 0)+'</div></div>' +
        '</div>';
      document.getElementById("health-data").innerHTML = html;
    } catch(e) {
      document.getElementById("health-data").innerHTML = '<p class="text-danger">Error loading health data. Please try again.</p>';
    }
  }
  loadHealth();
  document.getElementById("refresh-health")?.addEventListener("click", loadHealth);
});
</script>
{% endblock %}
