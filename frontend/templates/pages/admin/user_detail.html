{% extends "layouts/admin.html" %}
{% block title %}User Detail - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>User {{ user_id }}</h2></div>
  <div class="detail-grid"><div class="detail-section"><h3>Details</h3><div id="user-detail"><p class="text-muted">Loading...</p></div></div></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var u = await apiRequest("/api/v1/admin/users/{{ user_id }}");
    var html = '<div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">'+u.full_name+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">'+u.email+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">'+(u.phone_number||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Role</span><span class="detail-value"><span class="badge badge-primary">'+u.role+'</span></span></div>' +
      '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-'+(u.is_active?'success':'danger')+'">'+(u.is_active?'ACTIVE':'INACTIVE')+'</span></span></div>' +
      '<div class="detail-row"><span class="detail-label">Verified</span><span class="detail-value">'+(u.is_verified ? 'Yes' : 'No')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">'+formatDateTime(u.created_at)+'</span></div>';
    document.getElementById("user-detail").innerHTML = html;
  } catch(e) {
    document.getElementById("user-detail").innerHTML = '<p class="text-danger">Error loading user.</p>';
  }
});
</script>
{% endblock %}
