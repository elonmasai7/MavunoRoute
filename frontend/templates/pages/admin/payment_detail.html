{% extends "layouts/admin.html" %}
{% block title %}Payment Detail - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Payment {{ payment_id }}</h2></div>
  <div class="detail-grid"><div class="detail-section"><h3>Details</h3><div id="payment-detail"><p class="text-muted">Loading...</p></div></div></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var p = await apiRequest("/api/v1/payments/{{ payment_id }}");
    var html = '<div class="detail-row"><span class="detail-label">Amount</span><span class="detail-value">'+formatCurrency(p.amount)+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Method</span><span class="detail-value">'+(p.method||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-'+(p.status==='COMPLETED'?'success':p.status==='PENDING'?'warning':'danger')+'">'+p.status+'</span></span></div>' +
      '<div class="detail-row"><span class="detail-label">Reference</span><span class="detail-value">'+(p.reference||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">'+formatDateTime(p.created_at)+'</span></div>';
    document.getElementById("payment-detail").innerHTML = html;
  } catch(e) {
    document.getElementById("payment-detail").innerHTML = '<p class="text-danger">Error loading payment.</p>';
  }
});
</script>
{% endblock %}
