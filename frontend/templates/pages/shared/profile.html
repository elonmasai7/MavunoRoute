{% extends layout_template %}
{% block title %}Profile - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <h2>Profile</h2>
  <div class="detail-grid">
    <div class="detail-section">
      <h3>Account Information</h3>
      <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">{{ user.full_name }}</span></div>
      <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">{{ user.email }}</span></div>
      <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">{{ user.phone_number }}</span></div>
      <div class="detail-row"><span class="detail-label">Role</span><span class="detail-value"><span class="badge badge-primary">{{ user.role }}</span></span></div>
    </div>
  </div>
</section>
{% endblock %}
