{% extends user.role|lower ~ ".html" %}
{% block title %}Settings - MavunoRoute AI{% endblock %}
{% set active_page = "settings" %}
{% block content %}
<section class="card">
  <h2>Settings</h2>
  <p class="text-muted">Account settings and preferences.</p>
  <form>
    <label>Full Name <input type="text" name="full_name" value="{{ user.full_name }}"></label>
    <label>Phone Number <input type="text" name="phone_number" value="{{ user.phone_number }}"></label>
    <div class="form-actions"><button type="submit" class="btn btn-primary">Save Changes</button></div>
  </form>
</section>
{% endblock %}
