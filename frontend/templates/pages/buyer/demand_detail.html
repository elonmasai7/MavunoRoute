{% extends "layouts/buyer.html" %}
{% block title %}Demand Detail - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Demand {{ demand_id }}</h2></div>
  <div class="detail-grid">
    <div class="detail-section"><h3>Details</h3><div id="demand-detail"><p class="text-muted">Loading...</p></div></div>
  </div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var d = await apiRequest("/api/v1/buyer-demands/{{ demand_id }}");
    var html = '<div class="detail-row"><span class="detail-label">Crop</span><span class="detail-value">'+(d.crop_name||d.crop_id)+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Quantity</span><span class="detail-value">'+d.quantity_kg+' kg</span></div>' +
      '<div class="detail-row"><span class="detail-label">Grade</span><span class="detail-value">'+d.desired_grade+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Max Price</span><span class="detail-value">'+formatCurrency(d.max_price_per_kg)+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-'+(d.status==='OPEN'?'success':'info')+'">'+d.status+'</span></span></div>' +
      '<div class="detail-row"><span class="detail-label">Deadline</span><span class="detail-value">'+formatDateTime(d.required_delivery_datetime)+'</span></div>';
    document.getElementById("demand-detail").innerHTML = html;
  } catch(e) {
    document.getElementById("demand-detail").innerHTML = '<p class="text-danger">Error loading demand.</p>';
  }
});
</script>
{% endblock %}
