{% extends "layouts/buyer.html" %}
{% block title %}Demand Requests - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Demand Requests</h2><a href="/buyer/demands/create" class="btn btn-sm btn-primary">+ New Demand</a></div>
  <div class="table-wrapper"><table><thead><tr><th>Crop</th><th>Quantity (kg)</th><th>Max Price</th><th>Status</th><th>Deadline</th><th></th></tr></thead>
  <tbody id="demands-list"><tr class="table-empty"><td colspan="6"><p>No demands created yet.</p></td></tr></tbody></table></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var data = await apiRequest("/api/v1/buyer-demands?page=1&per_page=20");
    var items = data.items || data || [];
    var tbody = document.getElementById("demands-list");
    tbody.innerHTML = "";
    if (items.length === 0) {
      tbody.innerHTML = '<tr class="table-empty"><td colspan="6"><p>No demands created yet.</p></td></tr>';
    } else {
      items.forEach(function(d) {
        tbody.innerHTML += '<tr><td>'+(d.crop_name||d.crop_id)+'</td><td>'+d.quantity_kg+'</td><td>'+formatCurrency(d.max_price_per_kg)+'</td><td><span class="badge badge-'+(d.status==='OPEN'?'success':d.status==='FILLED'?'info':'warning')+'">'+d.status+'</span></td><td>'+formatDate(d.required_delivery_datetime)+'</td><td><a href="/buyer/demands/'+d.id+'" class="btn btn-sm btn-outline">View</a></td></tr>';
      });
    }
  } catch(e) {
    document.getElementById("demands-list").innerHTML = '<tr class="table-empty"><td colspan="6"><p>Error loading demands.</p></td></tr>';
  }
});
</script>
{% endblock %}
