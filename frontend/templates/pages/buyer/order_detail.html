{% extends "layouts/buyer.html" %}
{% block title %}Order Detail - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Order {{ order_id }}</h2></div>
  <div class="detail-grid"><div class="detail-section"><h3>Details</h3><div id="order-detail"><p class="text-muted">Loading...</p></div></div></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var o = await apiRequest("/api/v1/matching/matches/{{ order_id }}");
    var html = '<div class="detail-row"><span class="detail-label">Harvest</span><span class="detail-value">'+(o.harvest_id||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Quantity</span><span class="detail-value">'+o.quantity_kg+' kg</span></div>' +
      '<div class="detail-row"><span class="detail-label">Price/kg</span><span class="detail-value">'+formatCurrency(o.price_per_kg)+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Total</span><span class="detail-value">'+formatCurrency(o.quantity_kg * o.price_per_kg)+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-info">'+o.status+'</span></span></div>';
    document.getElementById("order-detail").innerHTML = html;
  } catch(e) {
    document.getElementById("order-detail").innerHTML = '<p class="text-danger">Error loading order.</p>';
  }
});
</script>
{% endblock %}
