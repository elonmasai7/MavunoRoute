{% extends "layouts/cold_hub.html" %}
{% block title %}Check-Out - MavunoRoute AI{% endblock %}
{% block content %}
<section class="form-card">
  <h2>Check-Out Produce</h2>
  <form id="checkout-form">
    <label>Harvest ID <input type="text" name="harvest_id" required placeholder="UUID of the harvest"></label>
    <label>Quantity (kg) <input type="number" name="quantity_kg" min="1" step="0.1" required></label>
    <p class="form-message" id="checkout-message"></p>
    <div class="form-actions"><button type="submit" class="btn btn-primary">Check Out</button></div>
  </form>
</section>
{% endblock %}
{% block page_js %}<script src="/static/js/pages/cold_hub.js"></script>{% endblock %}
