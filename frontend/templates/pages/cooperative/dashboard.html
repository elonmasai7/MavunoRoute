{% extends "layouts/cooperative.html" %}
{% block title %}Cooperative Dashboard - MavunoRoute AI{% endblock %}
{% block content %}
<div class="dashboard-grid">
  <div class="stat-card stat-primary"><div class="stat-label">Member Farmers</div><div class="stat-value" id="coop-farmers">-</div></div>
  <div class="stat-card stat-success"><div class="stat-label">Total Harvests</div><div class="stat-value" id="coop-harvests">-</div></div>
  <div class="stat-card stat-accent"><div class="stat-label">Aggregate Qty</div><div class="stat-value" id="coop-qty">-</div></div>
</div>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var coop = await fetchFirstFromList("/api/v1/cooperatives?page=1&per_page=1");
    if (coop && coop.id) {
      var farmers = await apiRequest(`/api/v1/cooperatives/${coop.id}/farmers?page=1&per_page=1`, "GET", null, { includeMeta: true });
      if (farmers.meta && farmers.meta.total !== undefined) {
        document.getElementById("coop-farmers").textContent = farmers.meta.total;
      }
    }
  } catch(e) {}
  try {
    var h = await apiRequest("/api/v1/harvest-batches?page=1&per_page=1", "GET", null, { includeMeta: true });
    document.getElementById("coop-harvests").textContent = (h.meta && h.meta.total !== undefined) ? h.meta.total : '-';
  } catch(e) {}
});
</script>
{% endblock %}
{% block page_js %}<script src="/static/js/pages/cooperative.js"></script>{% endblock %}
