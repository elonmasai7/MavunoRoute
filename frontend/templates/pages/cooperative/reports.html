{% extends "layouts/cooperative.html" %}
{% block title %}Cooperative Reports - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Reports</h2></div>
  <div class="dashboard-grid">
    <div class="stat-card stat-primary"><div class="stat-label">Total Farmers</div><div class="stat-value" id="rpt-farmers">-</div></div>
    <div class="stat-card stat-success"><div class="stat-label">Total Harvests</div><div class="stat-value" id="rpt-harvests">-</div></div>
    <div class="stat-card stat-accent"><div class="stat-label">Total Quantity</div><div class="stat-value" id="rpt-qty">-</div></div>
  </div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var coop = await fetchFirstFromList("/api/v1/cooperatives?page=1&per_page=1");
    if (coop && coop.id) {
      var data = await apiRequest(`/api/v1/cooperatives/${coop.id}/reports`);
      if (data.total_farmers !== undefined) document.getElementById("rpt-farmers").textContent = data.total_farmers;
    }
    var harvests = await apiRequest("/api/v1/harvest-batches?page=1&per_page=1", "GET", null, { includeMeta: true });
    if (harvests.meta && harvests.meta.total !== undefined) document.getElementById("rpt-harvests").textContent = harvests.meta.total;
    var dashboard = await apiRequest("/api/v1/reports/dashboard");
    if (dashboard.total_harvest_quantity_kg !== undefined) document.getElementById("rpt-qty").textContent = dashboard.total_harvest_quantity_kg + ' kg';
  } catch(e) {}
});
</script>
{% endblock %}
