{% extends "layouts/cooperative.html" %}
{% block title %}Aggregate Harvests - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <h2>Aggregate Harvests</h2>
  <div id="aggregate-data"><p class="text-muted">Loading aggregate data...</p></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var data = await fetchFirstFromList("/api/v1/cooperatives?page=1&per_page=1");
    if (!data || !data.id) {
      throw new Error("No cooperative profile found");
    }
    var reports = await apiRequest(`/api/v1/cooperatives/${data.id}/reports`);
    var html = '<div class="dashboard-grid">' +
      '<div class="stat-card stat-primary"><div class="stat-label">Cooperative</div><div class="stat-value">'+(data.name||'-')+'</div></div>' +
      '<div class="stat-card stat-success"><div class="stat-label">Total Farmers</div><div class="stat-value">'+(reports.total_farmers||'-')+'</div></div>' +
      '</div>';
    document.getElementById("aggregate-data").innerHTML = html;
  } catch(e) {
    document.getElementById("aggregate-data").innerHTML = '<p class="text-danger">Error loading aggregate data.</p>';
  }
});
</script>
{% endblock %}
