{% extends "layouts/farmer.html" %}
{% block title %}Reports - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>My Reports</h2></div>
  <div class="dashboard-grid">
    <div class="stat-card stat-primary"><div class="stat-label">Total Harvests</div><div class="stat-value" id="report-total-harvests">-</div></div>
    <div class="stat-card stat-success"><div class="stat-label">Total Quantity</div><div class="stat-value" id="report-total-qty">-</div></div>
    <div class="stat-card stat-accent"><div class="stat-label">Avg Price/kg</div><div class="stat-value" id="report-avg-price">-</div></div>
  </div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var farmers = await apiRequest("/api/v1/farmers?page=1&per_page=1");
    var farmer = Array.isArray(farmers) ? farmers[0] : null;
    if (farmer && farmer.id) {
      var perf = await apiRequest(`/api/v1/farmers/${farmer.id}/performance`);
      if (perf.total_batches !== undefined) document.getElementById("report-total-harvests").textContent = perf.total_batches;
    }
    var dashboard = await apiRequest("/api/v1/reports/dashboard");
    if (dashboard.total_harvest_quantity_kg !== undefined) document.getElementById("report-total-qty").textContent = dashboard.total_harvest_quantity_kg + ' kg';
    if (dashboard.average_harvest_price_per_kg !== undefined) document.getElementById("report-avg-price").textContent = formatCurrency(dashboard.average_harvest_price_per_kg);
  } catch(e) {}
});
</script>
{% endblock %}
