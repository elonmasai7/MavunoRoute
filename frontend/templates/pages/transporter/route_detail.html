{% extends "layouts/transporter.html" %}
{% block title %}Route Detail - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header"><h2>Route {{ route_id }}</h2></div>
  <div class="detail-grid"><div class="detail-section"><h3>Details</h3><div id="route-detail"><p class="text-muted">Loading...</p></div></div></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var r = await apiRequest("/api/v1/routes/{{ route_id }}");
    var html = '<div class="detail-row"><span class="detail-label">Total Distance</span><span class="detail-value">'+(r.total_distance_km ? r.total_distance_km+' km' : '-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Total Stops</span><span class="detail-value">'+(r.total_stops||'-')+'</span></div>' +
      '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-'+r.status+'">'+r.status+'</span></span></div>' +
      '<div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">'+formatDateTime(r.created_at)+'</span></div>';
    document.getElementById("route-detail").innerHTML = html;
  } catch(e) {
    document.getElementById("route-detail").innerHTML = '<p class="text-danger">Error loading route.</p>';
  }
});
</script>
{% endblock %}
