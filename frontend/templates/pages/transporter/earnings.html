{% extends "layouts/transporter.html" %}
{% block title %}Earnings - MavunoRoute AI{% endblock %}
{% block content %}
<div class="dashboard-grid">
  <div class="stat-card stat-success"><div class="stat-label">Total Earned</div><div class="stat-value" id="total-earned">-</div></div>
  <div class="stat-card stat-primary"><div class="stat-label">Completed Jobs</div><div class="stat-value" id="completed-jobs">-</div></div>
</div>
<section class="card">
  <div class="card-header"><h2>Payment History</h2></div>
  <div class="table-wrapper"><table><thead><tr><th>Date</th><th>Job</th><th>Amount</th><th>Status</th></tr></thead>
  <tbody id="earnings-list"><tr class="table-empty"><td colspan="4"><p>No earnings recorded yet.</p></td></tr></tbody></table></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  try {
    var data = await apiRequest("/api/v1/payments?page=1&per_page=20");
    var items = data.items || data || [];
    var tbody = document.getElementById("earnings-list");
    tbody.innerHTML = "";
    if (items.length === 0) {
      tbody.innerHTML = '<tr class="table-empty"><td colspan="4"><p>No earnings recorded yet.</p></td></tr>';
    } else {
      var total = 0;
      items.forEach(function(p) {
        if (p.status === 'COMPLETED') total += Number(p.amount);
        tbody.innerHTML += '<tr><td>'+formatDate(p.created_at)+'</td><td>'+(p.reference||'-')+'</td><td>'+formatCurrency(p.amount)+'</td><td><span class="badge badge-'+(p.status==='COMPLETED'?'success':p.status==='PENDING'?'warning':'danger')+'">'+p.status+'</span></td></tr>';
      });
      document.getElementById("total-earned").textContent = formatCurrency(total);
      document.getElementById("completed-jobs").textContent = items.filter(function(p) { return p.status === 'COMPLETED'; }).length;
    }
  } catch(e) {}
});
</script>
{% endblock %}
