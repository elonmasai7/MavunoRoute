{% extends "layouts/auth.html" %}
{% block title %}Reset Password - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <h2>Reset Password</h2>
  <form>
    <label>New Password <input type="password" name="password" required minlength="8"></label>
    <label>Confirm Password <input type="password" name="confirm_password" required minlength="8"></label>
    <button type="submit" class="btn btn-primary">Reset Password</button>
  </form>
</section>
{% endblock %}
