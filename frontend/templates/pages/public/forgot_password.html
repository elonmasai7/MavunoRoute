{% extends "layouts/auth.html" %}
{% block title %}Forgot Password - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <h2>Forgot Password</h2>
  <p class="text-muted">Enter your email and we will send you reset instructions.</p>
  <form>
    <label>Email <input type="email" name="email" required></label>
    <button type="submit" class="btn btn-primary">Send Reset Link</button>
    <p class="form-message"></p>
  </form>
  <p class="mt-2 text-center"><a href="/login">Back to login</a></p>
</section>
{% endblock %}
