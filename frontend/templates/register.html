{% extends "layouts/auth.html" %}
{% block title %}Register - MavunoRoute AI{% endblock %}
{% block content %}
<section class="card">
  <h2>Register</h2>
  <form id="register-form">
    <label>Full name <input type="text" name="full_name" required /></label>
    <label>Email <input type="email" name="email" required /></label>
    <label>Phone number <input type="text" name="phone_number" required /></label>
    <label>Password <input type="password" name="password" required minlength="8" /></label>
    <label>Role
      <select name="role" required>
        <option value="FARMER">Farmer</option>
        <option value="BUYER">Buyer</option>
        <option value="TRANSPORTER">Transporter</option>
        <option value="COLD_HUB_OPERATOR">Cold Hub Operator</option>
      </select>
    </label>
    <button type="submit" class="btn btn-primary">Create account</button>
    <p id="register-message" class="form-message"></p>
  </form>
  <p class="mt-2 text-center">Already have an account? <a href="/login">Login</a></p>
</section>
<script src="/static/js/auth.js"></script>
{% endblock %}
