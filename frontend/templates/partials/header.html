<header class="app-header">
  <button class="sidebar-toggle" aria-label="Toggle sidebar">&lsaquo;</button>
  <div class="header-search">
    <input type="text" placeholder="Search..." aria-label="Search">
  </div>
  <div class="header-actions">
    <a href="/profile" class="header-btn" title="Profile">
      <span class="header-avatar">{{ user.full_name[:1] | upper }}</span>
    </a>
    <a href="/logout" class="header-btn header-logout" title="Logout">&times;</a>
  </div>
</header>
